ShortDescription:   Fast screenshots with annotations — tray-resident, hotkey-driven, free.
Description: |
  Kashot is a fast, free, tray-resident screenshot tool with a built-in
  annotation editor. Hotkey to a region selector across all monitors, then
  annotate with pen, line, arrow, rectangle, ellipse, marker, text, numbered
  step, or pixelate. Save, copy, or pin to screen. Also records the screen to
  MP4 with microphone and system audio, captured natively via WASAPI — no
  Stereo Mix or virtual audio driver required. Native on Windows;
  native Linux and macOS via the Rust port.
