# Self-hosted Flatpak channel — published to repo.kashot.org by
# .github/workflows/build-flatpak-repo.yml. Users install with:
#   flatpak remote-add --if-not-exists kashot https://repo.kashot.org/kashot.flatpakrepo
#   flatpak install kashot org.kashot.Kashot
app-id: org.kashot.Kashot
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: kashot
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-pictures
  - --filesystem=xdg-download
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.gnome.Shell
  - --talk-name=com.canonical.AppMenu.Registrar

modules:
  - name: kashot
    buildsystem: simple
    only-arches: [x86_64]
    build-commands:
      - install -Dm755 kashot /app/bin/kashot
      # Bundled static FFmpeg (GPL), invoked as a separate process for
      # recording + format conversion. locate_ffmpeg() finds it next to
      # the kashot binary, so /app/bin/ffmpeg is picked up automatically.
      - install -Dm755 ffmpeg /app/bin/ffmpeg
      - install -Dm644 org.kashot.Kashot.desktop /app/share/applications/org.kashot.Kashot.desktop
      - install -Dm644 org.kashot.Kashot.png      /app/share/icons/hicolor/256x256/apps/org.kashot.Kashot.png
      - install -Dm644 org.kashot.Kashot.metainfo.xml /app/share/metainfo/org.kashot.Kashot.metainfo.xml
    sources:
      - type: archive
        url:    https://github.com/singhpratech/kashot/releases/download/v0.4.2/kashot-linux-x86_64.tar.gz
        sha256: REPLACE_AFTER_v0.4.2_RELEASE_PUBLISHES
        strip-components: 1
      - type: file
        path: org.kashot.Kashot.desktop
      - type: file
        path: org.kashot.Kashot.png
      - type: file
        path: org.kashot.Kashot.metainfo.xml
