<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#15151a"/>
    </linearGradient>
    <linearGradient id="ico" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffe600"/>
      <stop offset="55%"  stop-color="#7df0a8"/>
      <stop offset="100%" stop-color="#00e6c0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#7df0a8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7df0a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="320" rx="520" ry="280" fill="url(#glow)"/>

  <g transform="translate(420 130)">
    <rect x="14" y="14" width="228" height="228" rx="52" fill="url(#ico)"/>
    <g stroke="#fff" stroke-width="14" stroke-linecap="round" fill="none">
      <path d="M70 92 L70 70 L92 70"/>
      <path d="M186 92 L186 70 L164 70"/>
      <path d="M70 164 L70 186 L92 186"/>
      <path d="M186 164 L186 186 L164 186"/>
    </g>
    <circle cx="128" cy="128" r="11" fill="#fff"/>
  </g>

  <text x="600" y="450" text-anchor="middle"
        font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="78" font-weight="800" fill="#f1f1f3" letter-spacing="-2">
    Kashot
  </text>
  <text x="600" y="500" text-anchor="middle"
        font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="24" font-weight="500" fill="#a0a0aa">
    Fast screenshots with a real annotation editor.
  </text>
  <text x="600" y="555" text-anchor="middle"
        font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="20" font-weight="600" fill="#7df0a8">
    Native on Windows · kashot.org
  </text>
</svg>
