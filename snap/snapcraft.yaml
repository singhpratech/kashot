# Snap recipe for Kashot. Works on every distro with snapd installed
# (Ubuntu out of the box, plus Fedora / openSUSE / Arch / Debian via the
# snapd package).
#
# Build locally (from repo root):
#   snapcraft --use-lxd
#
# Publish (after `snapcraft login` + first registration):
#   snapcraft upload --release=edge kashot_*.snap
#
# Confinement choice
# ──────────────────
# Kashot needs: tray icon, global hotkey, full-screen capture, clipboard,
# audio capture for sound effects (future), and save-anywhere file writes.
# All of those are reachable from `strict` with the right plugs, so that's
# what we use here — strict confinement is what the Snap Store prefers and
# is what gets auto-approved. Classic confinement would also work but
# requires a manual review request from the store team.
name: kashot
title: Kashot
# core24 (Ubuntu 24.04) is required: the `xcap` Wayland capture crate
# pulls `pipewire 0.9.2` + `libspa 0.9.2`, which expect PipeWire 1.x
# headers. core22 ships PipeWire 0.3.58 and fails to compile.
base: core24
version: '0.3.7'
summary: Fast screenshots with annotations — tray-resident, hotkey-driven
description: |
  Kashot is a tray-resident screenshot tool with a built-in annotation editor.
  A global hotkey opens a region selector across all monitors; nine annotation
  tools (pen, line, arrow, rectangle, ellipse, marker, text, numbered step,
  blur/pixelate); four colour palettes; save, copy, or pin to screen.

  One Rust binary on Windows, Linux, and macOS.

grade: stable
confinement: strict
license: Apache-2.0
icon: icons/linux_hicolor/256x256/apps/kashot.png

# Snap Store listing metadata.
website: https://kashot.org
source-code: https://github.com/singhpratech/kashot
issues: https://github.com/singhpratech/kashot/issues
contact: https://github.com/singhpratech/kashot/issues

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  kashot:
    # The Rust plugin installs workspace binaries at $SNAP root (not bin/).
    command: kashot
    desktop: usr/share/applications/kashot.desktop
    extensions: [gnome]
    plugs:
      - home              # save screenshots into the user's home tree
      - desktop           # base desktop integration
      - desktop-legacy
      - wayland           # Wayland session capture / hotkey
      - x11               # X11 session capture / hotkey
      - unity7            # global tray on Ubuntu Unity / GNOME w/ AppIndicator
      - removable-media   # save to mounted USB / external drives
      - screen-inhibit-control
      - audio-record      # mic capture during screen recording
      - audio-playback    # required by Snap Store policy alongside audio-record
      - network           # update check
      - opengl

parts:
  kashot:
    plugin: rust
    # Whole repo (not just kashot-rs/) so the tray's
    # include_bytes!("../../../../icons/...") can find the icon source.
    source: .
    source-subdir: kashot-rs
    rust-channel: stable
    rust-features: []
    build-packages:
      - libclang-dev
      - libwayland-dev
      - libxkbcommon-dev
      - libxcb1-dev
      - libxcb-render0-dev
      - libxcb-shape0-dev
      - libxcb-xfixes0-dev
      - libxcb-composite0-dev
      - libxcb-randr0-dev
      - libxcb-cursor-dev
      - libxcb-keysyms1-dev
      - libxcb-icccm4-dev
      - libgtk-3-dev
      - libdbus-1-dev
      - libayatana-appindicator3-dev
      - libpipewire-0.3-dev
      - libgbm-dev
      - libxdo-dev
      - libssl-dev
      - pkg-config
    stage-packages:
      - libgtk-3-0
      - libxcb1
      - libwayland-client0
      - libdbus-1-3
      - libayatana-appindicator3-1
      - libxdo3
      - libpulse0
    override-build: |
      craftctl default
      install -Dm0644 "$CRAFT_PROJECT_DIR/dist/aur/kashot.desktop" \
        "$CRAFT_PART_INSTALL/usr/share/applications/kashot.desktop"
      install -Dm0644 "$CRAFT_PROJECT_DIR/icons/linux_hicolor/256x256/apps/kashot.png" \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps/kashot.png"
