# One-time (and on-demand) FFmpeg mirror.
#
# WHY: the release build (build-rust.yml) must NOT depend on third-party
# download servers (BtbN for Linux, gyan.dev for Windows, martin-riedl.de for
# macOS) every time it runs. This workflow fetches the static FFmpeg builds
# ONCE and re-publishes them as assets on a Kashot-owned GitHub release
# (`deps-ffmpeg-v1`). After that, every release build pulls FFmpeg only from
# that Kashot-owned release — so if an upstream server vanishes, our builds
# keep working. We refresh manually (re-run this workflow) only when we
# deliberately want a newer FFmpeg.
#
# Run it from the Actions tab → "Mirror FFmpeg" → Run workflow. It needs no
# secrets — the built-in GITHUB_TOKEN has the `contents: write` scope below.
#
# Licensing: the bundled builds include GPL components (libx264), so the
# FFmpeg binaries are GPL-2.0-or-later. To satisfy GPLv2 §3 without depending
# on third-party servers, this workflow also mirrors the matching corresponding
# source for every binary INTO the same release — the FFmpeg git tree at the
# exact commit for the Linux (BtbN snapshot) builds, and the matching
# ffmpeg.org release tarball for the Windows/macOS release builds — and writes
# a SOURCE.txt mapping each binary to its source + checksums + a written offer.
# Kashot calls FFmpeg as a separate process, so Kashot stays Apache-2.0. See
# THIRD_PARTY_LICENSES.md.
name: Mirror FFmpeg

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish the mirror under"
        default: "deps-ffmpeg-v1"
        required: true

permissions:
  contents: write

jobs:
  mirror:
    name: Fetch upstream static FFmpeg + publish to our release
    runs-on: ubuntu-latest
    steps:
      - name: Fetch all platforms
        run: |
          set -euxo pipefail
          mkdir -p out

          # ── Linux x86_64 (BtbN static GPL) ──
          # MUST be a build with --enable-libpulse: the recorder captures mic +
          # system audio via `-f pulse`. johnvansickle's static builds OMIT
          # libpulse, which silently broke Linux audio recording (ffmpeg errored
          # "Unknown input format: 'pulse'"). BtbN GPL builds include it.
          curl -fL --retry 3 -o lin64.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-8.1.tar.xz
          mkdir -p lin64 && tar -xJf lin64.tar.xz -C lin64 --strip-components=1
          cp lin64/bin/ffmpeg out/ffmpeg-linux-amd64

          # ── Linux arm64 (BtbN static GPL — same build batch, includes libpulse) ──
          curl -fL --retry 3 -o linarm.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linuxarm64-gpl-8.1.tar.xz
          mkdir -p linarm && tar -xJf linarm.tar.xz -C linarm --strip-components=1
          cp linarm/bin/ffmpeg out/ffmpeg-linux-arm64

          # Guard: fail loudly if the Linux build lacks pulse (would reintroduce
          # the silent audio-recording breakage).
          if ! out/ffmpeg-linux-amd64 -hide_banner -devices 2>/dev/null | grep -qi pulse; then
            echo "::error::Linux ffmpeg has no pulse indev — audio recording would break. Pick a build with --enable-libpulse."
            exit 1
          fi

          # ── Windows x86_64 (static, gyan.dev) ──
          curl -fL --retry 3 -o win.zip \
            https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          mkdir -p win && unzip -q win.zip -d win
          cp "$(find win -name ffmpeg.exe | head -1)" out/ffmpeg-win-amd64.exe

          # ── macOS arm64 (static, martin-riedl) ──
          curl -fL --retry 3 -o macarm.zip \
            https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip
          mkdir -p macarm && unzip -q macarm.zip -d macarm
          cp "$(find macarm -name ffmpeg -type f | head -1)" out/ffmpeg-macos-arm64

          # ── macOS x86_64 (static, martin-riedl) ──
          curl -fL --retry 3 -o macamd.zip \
            https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/release/ffmpeg.zip
          mkdir -p macamd && unzip -q macamd.zip -d macamd
          cp "$(find macamd -name ffmpeg -type f | head -1)" out/ffmpeg-macos-amd64

          chmod +x out/ffmpeg-*

          # Sanity-check the one we can actually run on this (linux amd64) host.
          out/ffmpeg-linux-amd64 -version | head -1

      - name: Mirror matching GPL source + write SOURCE.txt
        run: |
          set -euxo pipefail
          # Mirror the exact corresponding source (GPLv2 §3) for every binary
          # INTO this release, so it never depends on a third-party server.
          # Two resolution strategies:
          #   * Linux (BtbN): a release-branch snapshot. We RUN the amd64 binary
          #     on this x86_64 runner to read its authoritative git commit, then
          #     mirror the FFmpeg tree at that exact commit (arm64 is the same
          #     build batch → same commit).
          #   * Windows/macOS: release builds. Parse "FFmpeg version X.Y.Z" from
          #     the binary and mirror the matching ffmpeg.org release tarball.
          : > out/.srcmap                                   # "<binary>|<label>|<srcfile>"
          fetch_src() { [ -f "out/$1" ] || curl -fL --retry 3 -o "out/$1" "$2"; }

          # ---- Linux (BtbN) ----
          LVER=$(out/ffmpeg-linux-amd64 -hide_banner -version | head -1)
          LCOMMIT=$(echo "$LVER" | grep -oE 'g[0-9a-f]{7,40}' | head -1 | sed 's/^g//')
          if [ -n "$LCOMMIT" ]; then
            LSRC="ffmpeg-git-${LCOMMIT}.tar.gz"
            fetch_src "$LSRC" "https://github.com/FFmpeg/FFmpeg/archive/${LCOMMIT}.tar.gz"
            LLABEL="git ${LCOMMIT}"
          else
            LREL=$(echo "$LVER" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
            test -n "$LREL" || { echo "::error::could not parse Linux ffmpeg version"; exit 1; }
            LSRC="ffmpeg-${LREL}.tar.xz"
            fetch_src "$LSRC" "https://ffmpeg.org/releases/ffmpeg-${LREL}.tar.xz"
            LLABEL="$LREL"
          fi
          echo "ffmpeg-linux-amd64|$LLABEL|$LSRC" >> out/.srcmap
          echo "ffmpeg-linux-arm64|$LLABEL|$LSRC" >> out/.srcmap

          # ---- Windows + macOS (release builds) ----
          for b in ffmpeg-win-amd64.exe ffmpeg-macos-amd64 ffmpeg-macos-arm64; do
            rel=$(strings "out/$b" | grep -m1 -oiE 'ffmpeg version [0-9]+\.[0-9]+(\.[0-9]+)?' \
                  | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
            test -n "$rel" || { echo "::error::could not parse version for $b"; exit 1; }
            src="ffmpeg-${rel}.tar.xz"
            fetch_src "$src" "https://ffmpeg.org/releases/ffmpeg-${rel}.tar.xz"
            echo "$b|$rel|$src" >> out/.srcmap
          done

          ( cd out && sha256sum ffmpeg-*.tar.* )
          {
            echo "FFmpeg — GPL-2.0-or-later corresponding source"
            echo "================================================"
            echo
            echo "The FFmpeg binaries in this release are GPL-2.0-or-later (built"
            echo "with --enable-gpl, including libx264/libx265; the Linux builds"
            echo "also --enable-libpulse for microphone + system-audio capture)."
            echo "The complete corresponding source (GPLv2 section 3) is mirrored"
            echo "INTO this release, next to the binaries, so it never depends on"
            echo "a third-party server."
            echo
            echo "Binary -> version -> corresponding source (in THIS release)"
            echo "-----------------------------------------------------------"
            while IFS='|' read -r b label src; do
              printf '  %-22s %-18s ->  %s\n' "$b" "$label" "$src"
            done < out/.srcmap
            echo
            echo "Source checksums (sha256):"
            ( cd out && sha256sum ffmpeg-*.tar.* | sed 's/^/  /' )
            echo
            echo "Linux builds are BtbN static GPL builds; their exact source is"
            echo "the FFmpeg tree at the embedded git commit (ffmpeg-git-<commit>"
            echo ".tar.gz, from https://github.com/FFmpeg/FFmpeg). Windows/macOS are"
            echo "release builds whose source is the matching official tarball from"
            echo "https://ffmpeg.org/releases/ . The exact build configuration for"
            echo "any binary is printed by:  ffmpeg -version  (configuration: line)."
            echo
            echo "Written offer: for three years from distribution, the Kashot project"
            echo "will provide the complete corresponding machine-readable source for"
            echo "any binary here to any third party, for no more than the cost of"
            echo "distribution, on request via https://github.com/singhpratech/kashot ."
            echo
            echo "Kashot invokes ffmpeg as a separate process; Kashot is Apache-2.0."
            echo "See THIRD_PARTY_LICENSES.md in the kashot repo."
          } > out/SOURCE.txt
          rm -f out/.srcmap

      - name: Publish to Kashot-owned release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || 'deps-ffmpeg-v1' }}
        run: |
          set -euxo pipefail
          # Create the release if it doesn't exist yet (idempotent).
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "FFmpeg static mirror ($TAG)" \
              --notes "Kashot-owned mirror of static FFmpeg binaries so release builds never depend on third-party servers. GPL-2.0-or-later; see SOURCE.txt + THIRD_PARTY_LICENSES.md."
          fi
          # Upload/overwrite every asset.
          gh release upload "$TAG" out/* \
            --repo "$GITHUB_REPOSITORY" --clobber
