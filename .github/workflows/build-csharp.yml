# Build the existing C# Windows version (Kashot/Kashot.csproj) as long as it
# stays in the repo. Produces Kashot.msi + Kashot.exe + Kashot-portable.zip
# matching the artifacts referenced by docs/index.html.
#
# Once the Rust port reaches feature parity this workflow can be removed.

name: Build C# (Windows)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX
        # WiX 7+ requires accepting the OSMF EULA. WiX 5 is the last
        # pre-OSMF release and is sufficient for this MSI.
        run: dotnet tool install --global wix --version 5.*

      - name: Build all artifacts
        shell: pwsh
        run: ./Installer/build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: Kashot-csharp-windows
          path: |
            Kashot.msi
            Kashot.exe
            Kashot-portable.zip
          if-no-files-found: error

      - name: Attach to release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Kashot.msi
            Kashot.exe
            Kashot-portable.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
