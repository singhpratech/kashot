# Compile-check the legacy C# Windows build (Kashot/Kashot.csproj). The
# canonical shipped Windows binary is now the Rust build — see
# build-rust.yml. This workflow stays around so the C# reference
# implementation keeps compiling on PRs, and the MSI/EXE/ZIP are still
# produced as CI artifacts (downloadable from the run) for anyone who
# wants the WiX-installer flavour. Release attachment is disabled to
# avoid two competing Windows artifacts on the GitHub Release.

name: Build C# (Windows, legacy)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX
        # WiX 7+ requires accepting the OSMF EULA. WiX 5 is the last
        # pre-OSMF release and is sufficient for this MSI.
        run: dotnet tool install --global wix --version 5.*

      - name: Build all artifacts
        shell: pwsh
        run: ./Installer/build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: Kashot-csharp-windows
          path: |
            Kashot.msi
            Kashot.exe
            Kashot-portable.zip
          if-no-files-found: error
