# Build the Flatpak from dist/flatpak/org.kashot.Kashot.yaml AFTER the "Build
# Rust" workflow finishes a tag build (so the release tarball already exists),
# and publish the resulting OSTree repo to singhpratech/kashot-flatpak-repo,
# which serves at https://repo.kashot.org/ via GitHub Pages.
#
# We use workflow_run (not release:published) because releases created by the
# Actions GITHUB_TOKEN do NOT fire release events — that recursion guard would
# silently skip this build. workflow_run chains off Build Rust regardless.
#
# The tarball sha256 is computed inside this workflow from the URL in the
# manifest, so a placeholder/stale sha256 in the committed manifest can never
# fail the build — and there's no manual post-release SHA refresh.
#
# This is the self-hosted Flatpak channel — independent of Flathub. Users
# install with:
#   flatpak remote-add --if-not-exists kashot https://repo.kashot.org/kashot.flatpakrepo
#   flatpak install kashot org.kashot.Kashot
#
# Requires a fine-grained PAT with "Contents: write" scope on
# singhpratech/kashot-flatpak-repo, stored as repo secret KASHOT_FLATPAK_REPO_TOKEN.
name: Build Flatpak repo

on:
  workflow_run:
    workflows: [ "Build Rust" ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build + publish to repo.kashot.org
    # Manual runs always proceed. Automatic runs only when Build Rust SUCCEEDED
    # for a tag build (head_branch like v0.3.12) — skip Build Rust runs on main
    # / branches, which have no published release tarball to point at.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak + flatpak-builder + ostree
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flatpak flatpak-builder ostree appstream

      - name: Add Flathub remote (runtime source only)
        # We pull org.freedesktop.Platform//24.08 + Sdk//24.08 from Flathub
        # to *build* against. The resulting .flatpak does not require Flathub
        # at install time — users get the runtime extension via dependency
        # resolution on their own remotes.
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Pin tarball sha256 in the manifest (no placeholder/race failures)
        # Download the tarball the manifest points at and overwrite the sha256
        # line with the freshly computed hash. Retries cover the brief window
        # where a release is published just before its assets finish uploading.
        run: |
          set -euxo pipefail
          URL=$(grep -E '^[[:space:]]*url:' dist/flatpak/org.kashot.Kashot.yaml | awk '{print $2}')
          echo "manifest tarball URL: $URL"
          curl -fL --retry 8 --retry-all-errors --retry-delay 10 -o tarball.tgz "$URL"
          SHA=$(sha256sum tarball.tgz | awk '{print $1}')
          echo "computed sha256: $SHA"
          sed -i -E "s|^([[:space:]]*sha256:[[:space:]]*).*|\1$SHA|" \
            dist/flatpak/org.kashot.Kashot.yaml
          grep -E '^[[:space:]]*(url|sha256):' dist/flatpak/org.kashot.Kashot.yaml

      - name: Build Flatpak
        run: |
          flatpak-builder --user --install-deps-from=flathub \
            --force-clean --disable-rofiles-fuse \
            --repo=ostree-repo build-dir \
            dist/flatpak/org.kashot.Kashot.yaml

      - name: Generate .flatpakref + .flatpakrepo metadata
        run: |
          mkdir -p out
          cp -r ostree-repo out/repo

          # Static repo metadata published at /kashot.flatpakrepo so users can
          # `flatpak remote-add` from a single URL. Format documented at
          # https://docs.flatpak.org/en/latest/hosting-a-repository.html
          cat > out/kashot.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=Kashot
          Url=https://repo.kashot.org/repo/
          Homepage=https://kashot.org
          Comment=Self-hosted Flatpak repo for Kashot
          Description=Install Kashot (screenshot + recorder + format converter) on every Linux distro that ships Flatpak, without enabling Flathub.
          Icon=https://kashot.org/assets/kashot-256.png
          DefaultBranch=master
          GPGKey=
          EOF

          # Single-click install file. Users can do:
          #   flatpak install https://repo.kashot.org/org.kashot.Kashot.flatpakref
          cat > out/org.kashot.Kashot.flatpakref <<EOF
          [Flatpak Ref]
          Title=Kashot
          Name=org.kashot.Kashot
          Branch=master
          Url=https://repo.kashot.org/repo/
          SuggestRemoteName=kashot
          Homepage=https://kashot.org
          Icon=https://kashot.org/assets/kashot-256.png
          RuntimeRepo=https://flathub.org/repo/flathub.flatpakrepo
          IsRuntime=false
          EOF

      - name: Copy landing assets (README/index/CNAME) from current main of the repo
        # Keep the human-facing top-level files in sync with the destination
        # repo's main — fetched fresh each run so we don't drift if the user
        # edits README/index.html upstream.
        run: |
          git clone --depth=1 https://github.com/singhpratech/kashot-flatpak-repo.git dest-readonly
          cp dest-readonly/README.md   out/README.md   || true
          cp dest-readonly/index.html  out/index.html  || true
          cp dest-readonly/CNAME       out/CNAME       || true
          rm -rf dest-readonly

      - name: Push to singhpratech/kashot-flatpak-repo
        env:
          TOKEN: ${{ secrets.KASHOT_FLATPAK_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::KASHOT_FLATPAK_REPO_TOKEN secret is not set. See .github/workflows/build-flatpak-repo.yml header for setup."
            exit 1
          fi
          cd out
          git init -b main
          git config user.name  "singhpratech-bot"
          git config user.email "146540319+singhpratech@users.noreply.github.com"
          git add .
          git commit -m "publish: ${GITHUB_REF_NAME:-manual} ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git remote add origin "https://x-access-token:${TOKEN}@github.com/singhpratech/kashot-flatpak-repo.git"
          # Force push the whole repo — destination is a static site, history
          # doesn't matter, and a full overwrite avoids OSTree consistency
          # issues from partial updates.
          git push -f origin main
