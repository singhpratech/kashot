# Build & test the Rust workspace on every push, and produce release
# artifacts for Windows + Linux + macOS when a tag is pushed. The Rust
# binary is the canonical build on every platform — same source, same
# behaviour, one workflow.
#
# Outputs (uploaded to the GitHub Release on tag push):
#   Windows : kashot-windows-x86_64.zip, Kashot.msi
#   Linux   : kashot-linux-x86_64.tar.gz, kashot-linux-arm64.tar.gz,
#             kashot-x86_64.AppImage
#   macOS   : Kashot-macos-arm64, Kashot-macos-x64,
#             Kashot-macos-arm64.dmg, Kashot-macos-x64.dmg
#   Verify  : SHA256SUMS (sha256 of every asset in the release)
name: Build Rust

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

defaults:
  run:
    working-directory: kashot-rs

jobs:

  # ── 1. Test pure-logic crate on EVERY platform ──────────────────────────────
  # Same tests must pass on Ubuntu, Windows, and macOS. The same source code
  # backs all three platforms; if a test passes on one and fails on another,
  # it's a parity bug.
  test-core:
    name: Test kashot-core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: kashot-rs }
      - run: cargo test -p kashot-core --all-features

  # ── 2. Linux native build ──────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: kashot-rs }

      - name: Install system dev libs
        # libpipewire-0.3-dev → libspa-sys (xcap pulls it in for the Wayland /
        # xdg-desktop-portal capture path).
        # libgbm-dev → -lgbm at link time (Mesa's Generic Buffer Manager,
        # transitive of xcap's capture backend on Linux).
        # ffmpeg → bundled next to the release binary by kashot-app/build.rs
        # so the Convert-video dialog and screen-recording feature work
        # without requiring a system install on end-user machines.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-composite0-dev libxcb-randr0-dev libxcb-cursor-dev \
            libxcb-keysyms1-dev libxcb-icccm4-dev \
            libgtk-3-dev libdbus-1-dev libayatana-appindicator3-dev \
            libpipewire-0.3-dev libgbm-dev libxdo-dev libssl-dev pkg-config \
            ffmpeg
          echo "KASHOT_FFMPEG=$(which ffmpeg)" >> $GITHUB_ENV

      - run: cargo build --release --bin kashot

      - name: Run full workspace tests
        run: cargo test --workspace --release

      - name: Stage tarball
        run: |
          mkdir -p dist/kashot
          cp target/release/kashot dist/kashot/
          cd dist && tar -czf kashot-linux-x86_64.tar.gz kashot

      - uses: actions/upload-artifact@v4
        with:
          name: kashot-linux-x86_64
          path: kashot-rs/dist/kashot-linux-x86_64.tar.gz
          if-no-files-found: error

  # ── 2b. Linux arm64 native build ───────────────────────────────────────────
  # Native build on GitHub's free `ubuntu-24.04-arm` hosted runner (available
  # to public repos with no opt-in). Mirrors `build-linux` step-for-step —
  # same system deps, same staging shape, just a different runner + artifact
  # name. No cross-compile, no qemu.
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: kashot-rs }

      - name: Install system dev libs
        # Same package set as build-linux — all libs are available in the
        # arm64 Ubuntu archives.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-composite0-dev libxcb-randr0-dev libxcb-cursor-dev \
            libxcb-keysyms1-dev libxcb-icccm4-dev \
            libgtk-3-dev libdbus-1-dev libayatana-appindicator3-dev \
            libpipewire-0.3-dev libgbm-dev libxdo-dev libssl-dev pkg-config

      - run: cargo build --release --bin kashot

      - name: Run full workspace tests
        run: cargo test --workspace --release

      - name: Stage tarball
        run: |
          mkdir -p dist/kashot
          cp target/release/kashot dist/kashot/
          cd dist && tar -czf kashot-linux-arm64.tar.gz kashot

      - uses: actions/upload-artifact@v4
        with:
          name: kashot-linux-arm64
          path: kashot-rs/dist/kashot-linux-arm64.tar.gz
          if-no-files-found: error

  # ── 3. Windows native build ────────────────────────────────────────────────
  # Ships the same Rust binary as Linux + macOS — one source, one editor,
  # one feature set, three OSes. The legacy C# build (build-csharp.yml) is
  # retained as a PR compile-check for reference but no longer attaches to
  # the GitHub Release.
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: kashot-rs }

      - name: Download static ffmpeg
        # Pulled into KASHOT_FFMPEG so kashot-app/build.rs bundles ffmpeg.exe
        # next to the release binary — end users don't need a system install
        # to run the Convert-video dialog or (future) recording on Windows.
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          $dst = "$env:RUNNER_TEMP\ffmpeg"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          $ffmpeg = (Get-ChildItem -Path $dst -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName
          if (-not $ffmpeg) { throw "ffmpeg.exe not found in extracted archive" }
          echo "KASHOT_FFMPEG=$ffmpeg" >> $env:GITHUB_ENV

      - run: cargo build --release --bin kashot

      - name: Run full workspace tests
        run: cargo test --workspace --release

      - name: Stage zip
        shell: pwsh
        # ffmpeg.exe gets dropped into target\release\ by kashot-app/build.rs
        # (via KASHOT_FFMPEG). Hard-fail here if it's missing — shipping a
        # zip without it produces the runtime "ffmpeg.exe not found" error
        # users hit when recording on a fresh install.
        run: |
          New-Item -ItemType Directory -Force -Path dist\kashot | Out-Null
          Copy-Item target\release\kashot.exe dist\kashot\
          if (-not (Test-Path target\release\ffmpeg.exe)) {
            throw "target\release\ffmpeg.exe missing — kashot-app/build.rs did not bundle ffmpeg. Check KASHOT_FFMPEG was set before cargo build."
          }
          Copy-Item target\release\ffmpeg.exe dist\kashot\
          Compress-Archive -Path dist\kashot\* -DestinationPath dist\kashot-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: kashot-windows-x86_64
          path: kashot-rs/dist/kashot-windows-x86_64.zip
          if-no-files-found: error

      # ── MSI installer (cargo-wix) ────────────────────────────────────────
      # Re-introduces the installer-style asset that the legacy C# build
      # used to ship (`Installer/build.ps1` → `Kashot.msi`, removed in
      # PR #9). winget + chocolatey both expect `.msi`, not the `.zip`.
      #
      # WiX 3.x ships preinstalled on the `windows-latest` GitHub-hosted
      # runner image at `C:\Program Files (x86)\WiX Toolset v3.*\bin\`.
      # `cargo-wix` finds it via the WIX env var; we set it explicitly
      # to insulate ourselves from image upgrades that rename the dir.
      - name: Install cargo-wix
        shell: pwsh
        run: cargo install cargo-wix --locked --version 0.3.9

      - name: Locate WiX 3.x toolset
        shell: pwsh
        run: |
          $wixDir = Get-ChildItem 'C:\Program Files (x86)\' -Directory `
            | Where-Object { $_.Name -like 'WiX Toolset v3*' } `
            | Select-Object -First 1
          if (-not $wixDir) { throw "WiX 3.x toolset not found on runner image." }
          $wixBin = Join-Path $wixDir.FullName 'bin'
          echo "WIX=$($wixDir.FullName)\" >> $env:GITHUB_ENV
          echo "$wixBin" >> $env:GITHUB_PATH

      - name: Build Kashot.msi
        shell: pwsh
        # `cargo wix` re-uses the already-built kashot.exe under
        # target/release/. `--nocapture` lets us see candle/light output
        # in the GitHub Actions log; `--no-build` skips a redundant
        # `cargo build` (we ran it above).
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          cargo wix --package kashot-app `
                    --no-build `
                    --nocapture `
                    --include wix\main.wxs `
                    --output dist\Kashot.msi

      - uses: actions/upload-artifact@v4
        with:
          name: Kashot-msi
          path: kashot-rs/dist/Kashot.msi
          if-no-files-found: error

  # ── 4. macOS universal build (arm64 + x86_64 → one .app, two .dmg) ─────────
  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label:  arm64
          - target: x86_64-apple-darwin
            label:  x64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: kashot-rs }

      - name: Install ffmpeg
        # Bundled next to the release binary by kashot-app/build.rs via
        # KASHOT_FFMPEG, so Convert-video and (future) recording on macOS
        # work without a system install on end-user machines.
        run: |
          brew install ffmpeg
          echo "KASHOT_FFMPEG=$(which ffmpeg)" >> $GITHUB_ENV

      - run: cargo build --release --bin kashot --target ${{ matrix.target }}

      - name: Run full workspace tests on the host arch
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --workspace --release

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/kashot dist/Kashot-macos-${{ matrix.label }}

      - uses: actions/upload-artifact@v4
        with:
          name: Kashot-macos-${{ matrix.label }}
          path: kashot-rs/dist/Kashot-macos-${{ matrix.label }}
          if-no-files-found: error

      # ── .app bundle + .dmg ──────────────────────────────────────────────
      # Additive packaging: the raw binary above still ships unchanged
      # (anyone scripting against the old asset name keeps working). On
      # top of that we wrap it in a minimal `Kashot.app` bundle and let
      # `create-dmg` produce a drag-to-Applications installer.
      #
      # The .icns is built on the fly from the existing PNG iconset
      # under icons/macos_iconset/Kashot.iconset/ via `iconutil`, which
      # ships with the macOS runner image.
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Derive version string
        id: ver
        shell: bash
        # On tag pushes this is the version (e.g. v0.3.0 → 0.3.0).
        # On non-tag runs we still produce a DMG for sanity-checking;
        # use 0.0.0 so CFBundleShortVersionString is well-formed.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="0.0.0"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build Kashot.icns from existing iconset
        working-directory: .
        # The iconset directory already lives in the repo at
        # icons/macos_iconset/Kashot.iconset/; iconutil takes it
        # straight to .icns with no extra tooling.
        run: |
          iconutil -c icns \
            -o kashot-rs/dist/Kashot.icns \
            icons/macos_iconset/Kashot.iconset

      - name: Assemble Kashot.app bundle
        run: |
          set -eux
          APP="dist/Kashot.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          # Binary inside the bundle is always named `kashot` (matches
          # CFBundleExecutable below + the Info.plist contract).
          cp target/${{ matrix.target }}/release/kashot "$APP/Contents/MacOS/kashot"
          chmod +x "$APP/Contents/MacOS/kashot"
          cp dist/Kashot.icns "$APP/Contents/Resources/kashot.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
                                  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>            <string>Kashot</string>
            <key>CFBundleDisplayName</key>     <string>Kashot</string>
            <key>CFBundleIdentifier</key>      <string>org.kashot.Kashot</string>
            <key>CFBundleVersion</key>         <string>${{ steps.ver.outputs.version }}</string>
            <key>CFBundleShortVersionString</key><string>${{ steps.ver.outputs.version }}</string>
            <key>CFBundleExecutable</key>      <string>kashot</string>
            <key>CFBundleIconFile</key>        <string>kashot</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>LSMinimumSystemVersion</key>  <string>11.0</string>
            <key>LSUIElement</key>             <true/>
            <key>NSHighResolutionCapable</key> <true/>
          </dict>
          </plist>
          PLIST

      - name: Build Kashot-macos-${{ matrix.label }}.dmg
        # Drag-to-Applications layout: 500x320 window with the .app icon
        # on the left (125,125) and the /Applications drop-link on the
        # right (375,125). Gatekeeper quarantine is stripped by the user
        # on first launch (`xattr -dr com.apple.quarantine`); we aren't
        # codesigning in CI today.
        #
        # create-dmg returns 0 on success and 2 on the recoverable
        # "couldn't detach hdiutil" warning that happens on hosted
        # runners. Treat 2 as success.
        run: |
          set +e
          create-dmg \
            --volname "Kashot" \
            --window-size 500 320 \
            --icon-size 96 \
            --icon "Kashot.app" 125 125 \
            --app-drop-link 375 125 \
            "dist/Kashot-macos-${{ matrix.label }}.dmg" \
            "dist/Kashot.app"
          rc=$?
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "create-dmg failed with exit $rc"
            exit "$rc"
          fi
          test -f "dist/Kashot-macos-${{ matrix.label }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: Kashot-macos-${{ matrix.label }}-dmg
          path: kashot-rs/dist/Kashot-macos-${{ matrix.label }}.dmg
          if-no-files-found: error

  # ── 4b. Wrap the Linux x86_64 tarball into an AppImage ────────────────────
  # Downloads the staged `kashot-linux-x86_64.tar.gz` from `build-linux`,
  # assembles an AppDir using the existing `dist/appimage/AppRun` + the
  # 256x256 hicolor icon + the desktop entry, then runs `appimagetool` to
  # produce `kashot-x86_64.AppImage`. No Rust toolchain on this runner —
  # we never recompile, just repackage.
  build-appimage:
    name: Linux AppImage
    needs: [ build-linux ]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 tarball
        uses: actions/download-artifact@v4
        with:
          name: kashot-linux-x86_64
          path: dl

      - name: Install appimagetool
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file wget desktop-file-utils libfuse2
          wget -q -O appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Assemble AppDir
        run: |
          set -eux
          tar -xzf dl/kashot-linux-x86_64.tar.gz -C dl
          APPDIR=Kashot.AppDir
          mkdir -p "$APPDIR/usr/bin" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          install -Dm0755 dl/kashot/kashot "$APPDIR/usr/bin/kashot"
          install -Dm0755 dist/appimage/AppRun "$APPDIR/AppRun"
          install -Dm0644 dist/aur/kashot.desktop \
            "$APPDIR/usr/share/applications/kashot.desktop"
          # Top-level .desktop + icon are what appimagetool reads.
          cp dist/aur/kashot.desktop "$APPDIR/kashot.desktop"
          install -Dm0644 icons/linux_hicolor/256x256/apps/kashot.png \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/kashot.png"
          cp icons/linux_hicolor/256x256/apps/kashot.png "$APPDIR/kashot.png"
          # appimagetool requires `.DirIcon` to exist too.
          cp "$APPDIR/kashot.png" "$APPDIR/.DirIcon"

      - name: Build AppImage
        # ARCH must be set; --appimage-extract-and-run avoids needing FUSE
        # to mount the tool itself.
        run: |
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            Kashot.AppDir kashot-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: kashot-x86_64-AppImage
          path: kashot-x86_64.AppImage
          if-no-files-found: error

  # ── 5. On tag push: collect all artifacts onto the GitHub Release ──────────
  release:
    name: Publish release
    needs: [ build-linux, build-linux-arm64, build-windows, build-macos, build-appimage ]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Override the workflow-level `defaults.run.working-directory: kashot-rs`
    # — this job never checks out the repo (it only downloads artifacts),
    # so kashot-rs/ doesn't exist on the runner. Without this override every
    # `run:` step fails with "No such file or directory" before it starts.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show what we're shipping
        run: ls -lh artifacts/

      # ── SHA256SUMS ──────────────────────────────────────────────────────
      # One line per file in `<hash>  <filename>` form (the standard
      # `sha256sum -b *` output). The in-app self-updater (`feat/self-
      # updater` branch) fetches this from the release alongside the
      # platform asset and verifies the downloaded payload against the
      # listed hash before launching the replacement binary.
      #
      # We generate it AFTER all per-OS artifacts land so the hash list
      # covers every shipping file in one place.
      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          # `--binary` matches the `*` star-marker convention; sort by
          # filename so the file is stable across re-runs of the same
          # tag (helps `diff` it during release dry-runs).
          sha256sum --binary $(ls | sort) > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
