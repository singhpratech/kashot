# Build the Snap package on every push + PR, and publish to the Snap
# Store on tag push. Locks in the recipe shape we settled on after
# multiple iterations on 2026-05-17 (see snap/snapcraft.yaml header):
#
#   - base: core24 (required — xcap→pipewire 0.9.2 needs PipeWire 1.x
#     headers that ship in Ubuntu 24.04 but not 22.04)
#   - platforms: amd64 (core24 dropped the `architectures:` key)
#   - source: . + source-subdir: kashot-rs (the tray's include_bytes!
#     reaches outside kashot-rs/ for the icon)
#   - apps.kashot.command: kashot (Rust plugin installs binaries at
#     $CRAFT_PART_INSTALL root, not bin/)
#
# Outputs:
#   - PR / main push : .snap uploaded as build artifact
#   - tag push (v*) : .snap uploaded to Snap Store edge channel
#                     (requires SNAPCRAFT_STORE_CREDENTIALS secret)
name: Build Snap

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
    paths:
      - 'snap/**'
      - 'kashot-rs/**'
      - 'icons/**'
      - 'dist/aur/kashot.desktop'
      - '.github/workflows/build-snap.yml'
  # Manual publish for snap-only changes (e.g. packaging fixes) that don't
  # warrant a full version tag — builds and uploads the current snap to edge.
  workflow_dispatch:

jobs:
  build-snap:
    name: snap pack (amd64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: snapcore/action-build@v1
        id: snapcraft
        # snapcraft is invoked from repo root; recipe at snap/snapcraft.yaml.

      - name: Show snap metadata
        run: |
          ls -lh "${{ steps.snapcraft.outputs.snap }}"
          unsquashfs -l "${{ steps.snapcraft.outputs.snap }}" | head -40

      - uses: actions/upload-artifact@v4
        with:
          name: kashot-snap-amd64
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  publish-snap:
    name: snap upload → edge
    needs: [ build-snap ]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kashot-snap-amd64
          path: .

      # snapcore/action-publish@v1 doesn't expand globs — it passes the
      # literal `snap:` value straight to `snapcraft upload`, which then
      # fails with "<glob> is not a valid file". Resolve the actual file
      # name here (it's `kashot_<version>_amd64.snap`) and pass the
      # explicit path to the publish step.
      - name: Resolve snap filename
        id: snap_file
        run: |
          set -euo pipefail
          files=( kashot_*.snap )
          if [ ${#files[@]} -ne 1 ] || [ ! -f "${files[0]}" ]; then
            echo "::error::Expected exactly one kashot_*.snap, found: ${files[*]}"
            ls -la
            exit 1
          fi
          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"
          echo "Resolved snap: ${files[0]}"

      # We invoke `snapcraft upload` directly instead of
      # snapcore/action-publish@v1 because that action does
      # `base64 -d <secret> | snapcraft login --with -` which only accepts
      # the legacy Ubuntu One macaroon format. snapcraft 8.x export-login
      # produces a newer JSON-keyring format that snapcraft 8.x ITSELF
      # reads natively when present in the SNAPCRAFT_STORE_CREDENTIALS env
      # var — no login step needed.
      - name: Install snapcraft
        run: sudo snap install --classic snapcraft

      - name: Upload to Snap Store edge
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: snapcraft upload "${{ steps.snap_file.outputs.path }}" --release edge
